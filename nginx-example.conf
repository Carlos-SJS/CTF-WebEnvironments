# Example Nginx Configuration for CTF-WebEnvironments
# This configures a path-based routing setup on your VPS.

server {
    listen 80;
    server_name your-vps-domain.com; # Replace with your domain or IP

    # Route all normal CTF-Arena traffic here
    location / {
        # proxy_pass http://localhost:YOUR_CTF_ARENA_PORT;
        # ...
    }

    # Route CTF-WebEnvironments traffic to the Orchestrator Node.js API
    # The trailing slash on the proxy_pass is important depending on how you setup base paths,
    # but since our Express app explicitly handles `/ctf-env/:instanceId/*`, we just pass it straight through.
    location /ctf-env/ {
        proxy_pass http://127.0.0.1:3001; # Replace with the port you run the Orchestrator on
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # If Claude needs to hit the API, it might do so directly via /ctf-api/generate
    location /ctf-api/generate {
        proxy_pass http://127.0.0.1:3001/ctf-api/generate;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Optional: Add simple IP restriction or basic auth here so ONLY Claude/Your backend can generate envs
        # allow 127.0.0.1;
        # deny all;
    }
}
